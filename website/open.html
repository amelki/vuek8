<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open in Vue.k8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            text-align: center;
            max-width: 420px;
            padding: 40px;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #58a6ff;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p {
            font-size: 14px;
            color: #8b949e;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .resource {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 12px 16px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 13px;
            color: #e6edf3;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .btn-primary {
            background: #238636;
            color: #fff;
            margin-bottom: 12px;
        }
        .btn-primary:hover { background: #2ea043; }
        .btn-secondary {
            background: transparent;
            color: #58a6ff;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover { background: #161b22; }
        .status {
            font-size: 13px;
            color: #8b949e;
            margin-top: 16px;
        }
        .status.error { color: #d29922; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Vue.k8</div>
        <h1>Opening in Vue.k8...</h1>
        <div id="resource" class="resource" style="display:none"></div>
        <p id="status" class="status">Attempting to launch the app...</p>
        <div id="fallback" style="display:none">
            <a id="open-btn" class="btn btn-primary" href="#">Open in Vue.k8</a>
            <br><br>
            <a class="btn btn-secondary" href="https://vuek8.app/#download">Download Vue.k8</a>
        </div>
    </div>
    <script>
        const hash = window.location.hash.slice(1); // e.g. "pod/namespace/name"
        if (!hash) {
            document.getElementById('status').textContent = 'No resource specified.';
            document.getElementById('status').className = 'status error';
        } else {
            const deepLink = 'vuek8://' + hash;
            const parts = hash.split('/');
            if (parts[0] === 'pod' && parts.length >= 3) {
                const el = document.getElementById('resource');
                el.style.display = '';
                el.textContent = decodeURIComponent(parts[1]) + ' / ' + decodeURIComponent(parts[2]);
            }

            // Try to open the app
            let appOpened = false;
            window.addEventListener('blur', () => { appOpened = true; });
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) appOpened = true;
            });

            window.location.href = deepLink;

            // After a delay, show fallback only if the app didn't take focus
            setTimeout(() => {
                if (appOpened) {
                    document.getElementById('status').textContent = 'Vue.k8 opened. You can close this tab.';
                } else {
                    document.getElementById('status').textContent = "Vue.k8 doesn't seem to be installed.";
                    document.getElementById('status').className = 'status error';
                    document.getElementById('fallback').style.display = '';
                    document.getElementById('open-btn').href = deepLink;
                }
            }, 2000);
        }
    </script>
</body>
</html>
