<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vuek8</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-layout">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Clusters</span>
        <button id="sidebar-toggle" class="sidebar-toggle-btn" title="Collapse">&#x276E;</button>
      </div>
      <div id="cluster-list" class="cluster-list"></div>
      <div class="sidebar-footer">
        <button id="sidebar-options-btn" class="sidebar-options-btn">Options</button>
      </div>
    </aside>
    <div id="main-content">
      <div id="error-banner" class="error-banner hidden">
        <span id="error-banner-text"></span>
      </div>
      <div id="update-banner" class="update-banner hidden">
        <span id="update-text"></span>
        <a id="update-link" target="_blank">Download</a>
        <button id="update-dismiss" class="update-dismiss">&times;</button>
      </div>
      <header>
        <div class="controls">
          <select id="namespace-select">
            <option value="">All namespaces</option>
          </select>
          <select id="workload-select">
            <option value="">All workloads</option>
          </select>
          <input type="text" id="pod-search" placeholder="Filter pods...">
          <span id="pod-count"></span>
          <span id="refresh-indicator" title="Auto-refreshes every 3s"></span>
        </div>
        <span class="app-brand">Vue.k8</span>
      </header>
      <div class="tab-bar">
        <button class="tab active" data-tab="nodes">Nodes</button>
        <button class="tab" data-tab="workloads">Workloads</button>
        <button class="tab" data-tab="pods">Pods</button>
        <div id="progress-bar" class="progress-bar hidden">
          <div class="progress-track">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <span id="progress-text" class="progress-text"></span>
        </div>
        <span class="tab-sep"></span>
        <!-- Nodes tab controls -->
        <select id="topo-group" class="tab-ctrl nodes-only">
          <option value="pool">Group: Pool</option>
          <option value="role">Group: Role</option>
          <option value="subnet">Group: Subnet</option>
          <option value="flat">Group: Flat</option>
          <option value="label">Group: Label...</option>
        </select>
        <select id="topo-label-select" class="tab-ctrl hidden-ctrl"></select>
        <!-- Workloads tab controls -->
        <select id="workload-group" class="tab-ctrl workloads-only hidden-ctrl">
          <option value="kind">Group: Kind</option>
          <option value="flat">Group: Flat</option>
          <option value="by-kind">Cards: Kind</option>
        </select>
        <!-- Shared color mode (nodes + workloads) -->
        <select id="color-mode" class="tab-ctrl topo-only">
          <option value="status">Color: Status</option>
          <option value="cpu">Color: CPU</option>
          <option value="mem">Color: Memory</option>
        </select>
        <!-- Pods tab controls -->
        <select id="group-select" class="tab-ctrl pods-only hidden-ctrl">
          <option value="flat">Flat</option>
          <option value="node">Group by Node</option>
          <option value="workload">Group by Workload</option>
          <option value="node-workload">Node / Workload</option>
          <option value="workload-node">Workload / Node</option>
        </select>
        <button id="expand-all" class="tab-ctrl pods-only hidden-ctrl" title="Expand all">&#9660;</button>
        <button id="collapse-all" class="tab-ctrl pods-only hidden-ctrl" title="Collapse all">&#9654;</button>
      </div>
      <main>
        <div id="nodes-view" class="view"></div>
        <div id="workloads-view" class="view hidden"></div>
        <div id="pods-view" class="view hidden"></div>
      </main>
    </div>
  </div>
  <div id="detail-panel" class="detail-panel hidden">
    <div class="detail-header">
      <button id="detail-actions-btn" class="detail-header-btn" title="Actions">&#8942;</button>
      <span id="detail-title" class="detail-title"></span>
      <button id="detail-close" class="detail-close">&times;</button>
    </div>
    <div id="detail-body" class="detail-body"></div>
  </div>
  <div id="rename-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <span class="modal-title">Rename cluster</span>
        <button id="rename-close" class="detail-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="rename-input" class="modal-input" placeholder="Display name">
        <div class="modal-actions">
          <button id="rename-reset" class="btn btn-ghost">Reset</button>
          <button id="rename-cancel" class="btn btn-ghost">Cancel</button>
          <button id="rename-confirm" class="btn btn-primary">Rename</button>
        </div>
      </div>
    </div>
  </div>
  <div id="icon-modal" class="modal-overlay hidden">
    <div class="modal modal-md">
      <div class="modal-header">
        <span class="modal-title">Set cluster icon</span>
        <button id="icon-modal-close" class="detail-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="icon-source-tabs">
          <button class="icon-src-tab active" data-src="url">Fetch from URL</button>
          <button class="icon-src-tab" data-src="file">Upload file</button>
        </div>
        <div class="icon-src-panels">
          <div id="icon-src-url" class="icon-src-panel">
            <div class="icon-url-row">
              <input type="text" id="icon-url-input" class="modal-input" placeholder="Website or image URL (e.g. github.com)">
              <button id="icon-url-btn" class="btn btn-primary">Fetch</button>
            </div>
          </div>
          <div id="icon-src-file" class="icon-src-panel hidden">
            <button id="icon-file-btn" class="btn btn-ghost" style="width:100%">Choose image file...</button>
          </div>
        </div>
        <div id="icon-preview-section" class="icon-preview-section hidden">
          <div class="icon-preview-row">
            <canvas id="icon-preview-canvas" width="64" height="64" class="icon-preview-canvas"></canvas>
            <div class="icon-filters">
              <span class="icon-filter-label">Tint</span>
              <div class="icon-filter-swatches">
                <button class="icon-swatch active" data-filter="none" title="Original"></button>
                <button class="icon-swatch" data-filter="grayscale" title="Grayscale" style="background:#888"></button>
                <button class="icon-swatch" data-filter="red" title="Red" style="background:#e05050"></button>
                <button class="icon-swatch" data-filter="orange" title="Orange" style="background:#e0a030"></button>
                <button class="icon-swatch" data-filter="green" title="Green" style="background:#40a060"></button>
                <button class="icon-swatch" data-filter="blue" title="Blue" style="background:#4080e0"></button>
                <button class="icon-swatch" data-filter="purple" title="Purple" style="background:#9060d0"></button>
              </div>
            </div>
          </div>
          <div class="modal-actions">
            <button id="icon-cancel-btn" class="btn btn-ghost">Cancel</button>
            <button id="icon-apply-btn" class="btn btn-primary">Apply</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="tooltip" class="tooltip hidden"></div>
  <script src="app.js"></script>
</body>
</html>
