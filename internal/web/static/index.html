<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vuek8</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-layout">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Clusters</span>
        <button id="sidebar-toggle" class="sidebar-toggle-btn" title="Collapse">&#x276E;</button>
      </div>
      <div id="cluster-list" class="cluster-list"></div>
      <div class="sidebar-footer">
        <button id="sidebar-options-btn" class="sidebar-options-btn">Options</button>
      </div>
    </aside>
    <div id="main-content">
      <div id="error-banner" class="error-banner hidden">
        <span id="error-banner-text"></span>
      </div>
      <div id="update-banner" class="update-banner hidden">
        <span id="update-text"></span>
        <a id="update-link" target="_blank">Download</a>
        <button id="update-dismiss" class="update-dismiss">&times;</button>
      </div>
      <header>
        <div class="controls">
          <select id="namespace-select">
            <option value="">All namespaces</option>
          </select>
          <select id="workload-select">
            <option value="">All workloads</option>
          </select>
          <input type="text" id="pod-search" placeholder="Filter pods...">
          <span id="pod-count"></span>
          <span id="refresh-indicator" title="Auto-refreshes every 3s"></span>
        </div>
        <span class="app-brand">Vue.k8</span>
      </header>
      <div class="tab-bar">
        <button class="tab active" data-tab="topology">Topology</button>
        <button class="tab" data-tab="list">List</button>
        <div id="progress-bar" class="progress-bar hidden">
          <div class="progress-track">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <span id="progress-text" class="progress-text"></span>
        </div>
        <span class="tab-sep"></span>
        <select id="topo-group" class="tab-ctrl topo-only">
          <option value="pool">Group: Pool</option>
          <option value="role">Group: Role</option>
          <option value="subnet">Group: Subnet</option>
          <option value="flat">Group: Flat</option>
          <option value="label">Group: Label...</option>
        </select>
        <select id="topo-label-select" class="tab-ctrl hidden-ctrl"></select>
        <select id="color-mode" class="tab-ctrl topo-only">
          <option value="status">Color: Status</option>
          <option value="cpu">Color: CPU</option>
          <option value="mem">Color: Memory</option>
        </select>
        <select id="group-select" class="tab-ctrl list-only hidden-ctrl">
          <option value="flat">Flat</option>
          <option value="node">Group by Node</option>
          <option value="workload">Group by Workload</option>
          <option value="node-workload">Node / Workload</option>
          <option value="workload-node">Workload / Node</option>
        </select>
        <button id="expand-all" class="tab-ctrl list-only hidden-ctrl" title="Expand all">&#9660;</button>
        <button id="collapse-all" class="tab-ctrl list-only hidden-ctrl" title="Collapse all">&#9654;</button>
      </div>
      <main>
        <div id="topology" class="view"></div>
        <div id="tree" class="view hidden"></div>
      </main>
    </div>
  </div>
  <div id="detail-panel" class="detail-panel hidden">
    <div class="detail-header">
      <button id="detail-actions-btn" class="detail-header-btn" title="Actions">&#8942;</button>
      <span id="detail-title" class="detail-title"></span>
      <button id="detail-close" class="detail-close">&times;</button>
    </div>
    <div id="detail-body" class="detail-body"></div>
  </div>
  <div id="rename-modal" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <span class="modal-title">Rename cluster</span>
        <button id="rename-close" class="detail-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="text" id="rename-input" class="modal-input" placeholder="Display name">
        <div class="modal-actions">
          <button id="rename-cancel" class="btn btn-ghost">Cancel</button>
          <button id="rename-confirm" class="btn btn-primary">Rename</button>
        </div>
      </div>
    </div>
  </div>
  <div id="tooltip" class="tooltip hidden"></div>
  <script src="app.js"></script>
</body>
</html>
